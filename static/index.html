<html lang="en">
<head>

<meta charset="utf-8" />
<meta content="text/html; charset=utf-8" http-equiv="Content-Type" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

<title>LineRage</title>

<link rel="icon" type="image/png" href="images/icon_32.png" />
<link href="css/base.css" rel="stylesheet" type="text/css"/>

</head>
<body>

<div id="content">
    <div id="header">
        <span id="score">0</span>
        <h1>LineRage</h1>
    </div>
    <div id="game">
        <div id="hud" style="display: none;"></div>
        <canvas id="dynamic_canvas" width="640" height="480" style="z-index: 2;"></canvas>
        <canvas id="static_canvas" width="640" height="480" style="z-index: 1;"></canvas>
    </div>
    <div id="messages"></div>
    <div id="touch-controls" aria-label="Touch controls">
        <button id="touch-left" class="touch-button" aria-label="Turn left">◀</button>
        <button id="touch-start" class="touch-button touch-start" aria-label="Start or pause">Start</button>
        <button id="touch-right" class="touch-button" aria-label="Turn right">▶</button>
    </div>
</div>

<script src="js/extern/jquery-1.4.4.min.js"></script>
<script src="js/extern/jquery.disable.text.select.js"></script>
<script src="https://unpkg.com/peerjs@1.5.5/dist/peerjs.min.js"></script>

<script src="js/lib/Class.js"></script>
<script src="js/lib/Dom.js"></script>

<script src="js/lib/Util.js"></script>
<script src="js/lib/Clock.js"></script>
<script src="js/lib/Collision.js"></script>

<script src="js/core/Input.js"></script>
<script src="js/core/Player.js"></script>
<script src="js/core/Level.js"></script>
<script src="js/core/Entity.js"></script>

<script src="js/core/Game.js"></script>
<script src="js/core/Hud.js"></script>
<script src="js/core/Multiplayer.js"></script>
<script src="js/core/TouchControls.js"></script>
<script src="js/core/Init.js"></script>

<!-- Dev only -->
<script src="js/dev/Stats.js"></script>
<script type="text/javascript">
    stats = new Stats();
    stats.domElement.style.position = 'absolute';
    stats.domElement.style.top = '0';
    stats.domElement.style.right = '0';

    $("body")[0].appendChild(stats.domElement);
</script>
<!-- -->

</body>

</html>
